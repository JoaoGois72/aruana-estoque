{% extends "base.html" %}
{% block content %}

<h4 class="mb-3">Nova Solicitação</h4>

<form method="post" class="card p-3 shadow-sm">

    <!-- 📍 LOCAL -->
    <div class="row mb-3">
        <div class="col-md-2">
            <label>Torre</label>
            <input type="text" name="torre" class="form-control">
        </div>

        <div class="col-md-2">
            <label>Pav.</label>
            <input type="text" name="pav" class="form-control">
        </div>

        <div class="col-md-2">
            <label>Apto</label>
            <input type="text" name="apto" class="form-control">
        </div>

        <div class="col-md-6">
            <label>Observação</label>
            <input type="text" name="observacao" class="form-control">
        </div>
    </div>

    <!-- 📦 ITENS -->
    <h6 class="mt-3">Materiais</h6>

    <table class="table table-bordered align-middle" id="tabela-itens">
        <thead class="table-light">
            <tr>
                <th style="width:70%">Material</th>
                <th style="width:20%">Quantidade</th>
                <th style="width:10%"></th>
            </tr>
        </thead>
        <tbody>

            <tr>
                <td>
                    <select name="material_id[]" class="form-select material-select" required></select>
                </td>

                <td>
                    <input type="number" step="0.01" name="qtd[]" class="form-control" required>
                </td>

                <td class="text-center">
                    <button type="button" class="btn btn-danger btn-sm remover">
                        ✖
                    </button>
                </td>
            </tr>

        </tbody>
    </table>

    <button type="button" class="btn btn-outline-primary btn-sm" id="add-item">
        + Adicionar Material
    </button>

    <!-- 💾 BOTÃO -->
    <div class="mt-4">
        <button class="btn btn-success">Salvar Solicitação</button>
        <a href="{{ url_for('estoque.solicitacoes_lista') }}" class="btn btn-secondary">Cancelar</a>
    </div>

</form>

{% endblock %}

{% block scripts %}
<script>
function iniciarSelectMaterial(el) {
    $(el).select2({
        placeholder: "Digite nome ou código do material...",
        minimumInputLength: 1,
        width: '100%',
        ajax: {
            url: "{{ url_for('estoque.materiais_buscar') }}",
            dataType: "json",
            delay: 200,
            data: function (params) {
                return {
                    q: params.term
                };
            },
            processResults: function (data) {
                return data;
            },
            cache: true
        }
    });
}

$(document).ready(function () {
    $('.material-select').each(function () {
        iniciarSelectMaterial(this);
    });
});
</script>
{% endblock %}
