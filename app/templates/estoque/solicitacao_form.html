{% extends "base.html" %}
{% block content %}

<h4 class="mb-3">Nova Solicitação</h4>

<form method="post" class="card p-3 shadow-sm">

    <div class="row mb-3">
        <div class="col-md-2">
            <label class="form-label">Torre</label>
            <input type="text" name="local_torre" class="form-control">
        </div>

        <div class="col-md-2">
            <label class="form-label">Pav.</label>
            <input type="text" name="local_pav" class="form-control">
        </div>

        <div class="col-md-2">
            <label class="form-label">Apto</label>
            <input type="text" name="local_apto" class="form-control">
        </div>

        <div class="col-md-6">
            <label class="form-label">Observação</label>
            <input type="text" name="observacao" class="form-control">
        </div>
    </div>

    <h6 class="mt-3">Materiais</h6>

    <div class="table-responsive">
        <table class="table table-bordered align-middle" id="tabela-itens">
            <thead class="table-light">
                <tr>
                    <th style="width: 42%">Material</th>
                    <th style="width: 18%">Saldo</th>
                    <th style="width: 12%">Unidade</th>
                    <th style="width: 18%">Quantidade</th>
                    <th style="width: 10%"></th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <select name="material_id[]" class="form-select material-select" required></select>
                    </td>
                    <td>
                        <input type="text" class="form-control saldo-material" readonly>
                    </td>
                    <td>
                        <input type="text" class="form-control unidade-material" readonly>
                    </td>
                    <td>
                        <input type="number" step="0.01" min="0.01" name="qtd[]" class="form-control qtd-material" required>
                    </td>
                    <td class="text-center">
                        <button type="button" class="btn btn-danger btn-sm remover">✖</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <button type="button" class="btn btn-outline-primary btn-sm" id="add-item">
        + Adicionar Material
    </button>

    <div class="mt-4">
        <button class="btn btn-success">Salvar Solicitação</button>
        <a href="{{ url_for('estoque.solicitacoes_lista') }}" class="btn btn-secondary">Cancelar</a>
    </div>

</form>

{% endblock %}

{% block scripts %}
<script>
function iniciarSelectMaterial(el) {
    $(el).select2({
        placeholder: "Digite nome ou código do material...",
        minimumInputLength: 1,
        width: '100%',
        ajax: {
            url: "{{ url_for('estoque.materiais_buscar') }}",
            dataType: "json",
            delay: 200,
            data: function (params) {
                return { q: params.term };
            },
            processResults: function (data) {
                return data;
            },
            cache: true
        }
    });
}

function atualizarDadosLinha($linha, data) {
    const saldo = Number(data.saldo || 0);
    const unidade = data.unidade || "";

    $linha.find('.saldo-material').val(saldo.toFixed(2));
    $linha.find('.unidade-material').val(unidade);

    const $qtd = $linha.find('.qtd-material');
    $qtd.attr('max', saldo);
    $qtd.attr('placeholder', 'Máx: ' + saldo.toFixed(2));
}

function validarQuantidade($linha) {
    const saldo = Number($linha.find('.saldo-material').val().replace(',', '.') || 0);
    const $qtd = $linha.find('.qtd-material');
    const qtd = Number(($qtd.val() || '0').replace(',', '.'));

    if (qtd > saldo) {
        alert('Quantidade maior que o saldo disponível.');
        $qtd.val('');
        $qtd.focus();
        return false;
    }

    if (qtd <= 0 && $qtd.val() !== '') {
        alert('Informe uma quantidade válida.');
        $qtd.val('');
        $qtd.focus();
        return false;
    }

    return true;
}

$(document).ready(function () {
    $('.material-select').each(function () {
        iniciarSelectMaterial(this);
    });

    $(document).on('select2:select', '.material-select', function (e) {
        const data = e.params.data;
        const $linha = $(this).closest('tr');

        atualizarDadosLinha($linha, data);

        $linha.find('.qtd-material').focus();
    });

    $(document).on('input', '.qtd-material', function () {
        validarQuantidade($(this).closest('tr'));
    });

    $('#add-item').on('click', function () {
        const novaLinha = $(`
            <tr>
                <td>
                    <select name="material_id[]" class="form-select material-select" required></select>
                </td>
                <td>
                    <input type="text" class="form-control saldo-material" readonly>
                </td>
                <td>
                    <input type="text" class="form-control unidade-material" readonly>
                </td>
                <td>
                    <input type="number" step="0.01" min="0.01" name="qtd[]" class="form-control qtd-material" required>
                </td>
                <td class="text-center">
                    <button type="button" class="btn btn-danger btn-sm remover">✖</button>
                </td>
            </tr>
        `);

        $('#tabela-itens tbody').append(novaLinha);

        const $novoSelect = novaLinha.find('.material-select');
        iniciarSelectMaterial($novoSelect);

        $novoSelect.select2('open');
    });

    $(document).on('click', '.remover', function () {
        if ($('#tabela-itens tbody tr').length > 1) {
            $(this).closest('tr').remove();
        }
    });

    $('form').on('submit', function (e) {
        let ok = true;

        $('#tabela-itens tbody tr').each(function () {
            const $linha = $(this);
            if (!validarQuantidade($linha)) {
                ok = false;
                return false;
            }
        });

        if (!ok) {
            e.preventDefault();
        }
    });
});
</script>
{% endblock %}
