{% extends "base.html" %}
{% block content %}

<h4>Nova Solicitação</h4>

<form method="post" class="card p-3">
  <div class="row g-2 mb-3">
    <div class="col-md-2">
      <label class="form-label">Torre</label>
      <input type="text" name="local_torre" class="form-control">
    </div>
    <div class="col-md-2">
      <label class="form-label">Pav.</label>
      <input type="text" name="local_pav" class="form-control">
    </div>
    <div class="col-md-2">
      <label class="form-label">Apto</label>
      <input type="text" name="local_apto" class="form-control">
    </div>
    <div class="col-md-6">
      <label class="form-label">Observação</label>
      <input type="text" name="observacao" class="form-control">
    </div>
  </div>

  <div id="itens">
    <div class="row g-2 mb-2 item-row">
      <div class="col-md-8">
        <label class="form-label">Material</label>
        <select name="material_id[]" class="form-select">
          <option value="">Selecione</option>
          {% for m in materiais %}
            <option value="{{ m.id }}">{{ m.codigo or '' }} - {{ m.nome }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">Quantidade</label>
        <input type="number" step="0.01" name="qtd[]" class="form-control">
      </div>
    </div>
  </div>

  <div class="mt-2 mb-3">
    <button type="button" class="btn btn-outline-secondary" onclick="addItem()">+ Adicionar Item</button>
  </div>

  <button class="btn btn-primary">Salvar Solicitação</button>
</form>

<script>
function addItem() {
  const container = document.getElementById("itens");
  const row = document.querySelector(".item-row").cloneNode(true);
  row.querySelectorAll("select, input").forEach(el => el.value = "");
  container.appendChild(row);
}
</script>

{% endblock %}
