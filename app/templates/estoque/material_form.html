{% extends "base.html" %}
{% block content %}

<h4>{{ "Editar Material" if material else "Novo Material" }}</h4>

<form method="post" class="card p-3 shadow-sm mt-3">

  <div class="row g-2">

    <div class="col-md-3">
      <label class="form-label">Código</label>
      <input class="form-control" name="codigo"
             value="{{ material.codigo if material else '' }}"
             placeholder="Deixe em branco para gerar automático">
    </div>

    <div class="col-md-5">
      <label class="form-label">Nome do Material</label>
      <input class="form-control" name="nome"
             value="{{ material.nome if material else '' }}" required>
    </div>

    <div class="col-md-2">
      <label class="form-label">Unidade</label>
      <input class="form-control" name="unidade"
             value="{{ material.unidade if material else '' }}" required>
    </div>

    <div class="col-md-2">
      <label class="form-label">Categoria</label>

      <select name="categoria_id" class="form-select select2" required>
        <option value="">Selecione</option>

        {% for c in categorias %}
          <option value="{{ c.id }}"
            {% if material and material.categoria_id == c.id %}selected{% endif %}>
            {{ c.nome }}
          </option>
        {% endfor %}

      </select>
    </div>

    <div class="col-md-3">
      <label class="form-label">Estoque mínimo</label>
      <input class="form-control" name="estoque_minimo"
             value="{{ material.estoque_minimo if material else 0 }}">
    </div>

    <div class="col-md-3">
      <label class="form-label">Saldo atual</label>
      <input class="form-control" name="saldo_atual"
             value="{{ material.saldo_atual if material else 0 }}">
    </div>

  </div>

  <div class="mt-3">
    <button class="btn btn-primary">Salvar</button>
    <a class="btn btn-secondary" href="{{ url_for('estoque.materiais') }}">
      Cancelar
    </a>
  </div>

</form>

{% endblock %}

{% block scripts %}
<script>
$(document).ready(function() {
    $('.select2').select2({
        placeholder: "Selecione uma categoria",
        width: '100%'
    });
});
</script>
{% endblock %}
